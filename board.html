<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="https://1o1c.org/logo.png">
    <title>Message Boards | 1O1C Anarchy Network</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0c10; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        .glow-text { text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between antialiased text-gray-200">

    <nav class="sticky top-0 z-50 bg-[#0b0c10]/95 backdrop-blur-md border-b border-gray-900 px-4 py-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center md:justify-between">
            <div class="flex items-center justify-between w-full md:w-auto">
                <a href="index.html" class="text-2xl font-black text-white tracking-wider hover:text-red-500 transition-colors">1O1C</a>
                <button onclick="toggleMenu()" class="text-gray-300 hover:text-white focus:outline-none md:hidden text-xl">
                    <i id="menuIcon" class="fa-solid fa-bars"></i>
                </button>
            </div>
            <div id="navLinks" class="hidden md:flex flex-col md:flex-row items-left md:items-center space-y-3 md:space-y-0 space-x-0 md:space-x-6 font-semibold tracking-wide text-sm md:text-base mt-4 md:mt-0 pt-3 md:pt-0 border-t border-gray-900 md:border-none">
                <a href="index.html" class="text-gray-300 hover:text-white transition-colors pb-1 w-max">Home</a>
                <a href="rules.html" class="text-gray-300 hover:text-white transition-colors pb-1 w-max">Rules</a>
                <a href="store.html" class="text-gray-300 hover:text-white transition-colors pb-1 w-max">Feature Shop</a>
                <a href="board.html" class="text-red-500 border-b-2 border-red-500 pb-1 w-max">Message Boards</a>
                <a href="support.html" class="text-gray-300 hover:text-white transition-colors pb-1 w-max">Support</a>
            </div>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto w-full px-4 py-12 flex-grow">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-white uppercase tracking-wider glow-text mb-2">Network Message Board</h1>
            <p class="text-gray-400 text-sm">Drop logs, trade coords, or talk strategy with anyone globally.</p>
        </div>

        <div class="bg-[#12141c]/60 border border-gray-900 rounded-xl p-6 shadow-2xl">
            <div id="cusdis_thread"
                 data-host="https://cusdis.com"
                 data-app-id="9108b5e9-d758-47df-bc6a-cb1b0e3be5b4"
                 data-page-id="1o1c_global_board"
                 data-page-url="https://1o1c.org/board.html"
                 data-page-title="1O1C Message Board"
                 data-theme="dark">
            </div>
            <script async src="https://cusdis.com/js/cusdis.es.js"></script>
        </div>
    </main>

    <footer class="text-center py-6 border-t border-gray-900 bg-[#0b0c10] text-gray-600 text-xs w-full px-4">
        &copy; 2026 1O1C. Not affiliated with Mojang Studios. Hosted on optimized self-hosted hardware nodes.
    </footer>

    <script>
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            const menuIcon = document.getElementById('menuIcon');
            if (navLinks.classList.contains('hidden')) {
                navLinks.classList.remove('hidden'); navLinks.classList.add('flex');
                menuIcon.classList.replace('fa-bars', 'fa-xmark');
            } else {
                navLinks.classList.add('hidden'); navLinks.classList.remove('flex');
                menuIcon.classList.replace('fa-xmark', 'fa-bars');
            }
        }
    </script>
</body>
</html>
